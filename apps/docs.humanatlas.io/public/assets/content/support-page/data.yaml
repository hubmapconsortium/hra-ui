$schema: ../../../../src/app/schemas/content-page/content-page.schema.json
title: Support
subtitle: |
  Guidance, troubleshooting, and resources to help integrate APIs, visualize data, or contribute tools and datasets.
icons: product:developer-portal
content:
  - component: PageSection
    tagline: Overview
    anchor: overview
    level: 2
    content:
      - component: Markdown
        data: |
          This support page provides guidance, troubleshooting, and resources to help integrate APIs, visualize data, or contribute tools and datasets.
  - component: PageSection
    tagline: Quick links
    anchor: quick-links
    level: 2
    content:
      - component: Markdown
        data: |
          - [API Reference](https://docs.humanatlas.io/dev/api): Detailed documentation for all public endpoints.
          - [Tutorials](https://docs.humanatlas.io/dev/tutorials): Hands-on guides for developers.
          - [Knowledge Graph for Developers](https://docs.humanatlas.io/dev/kg): Get programmatic access to the HRA Knowledge Graph.
          - [Embedding Web Components](https://docs.humanatlas.io/dev/web-components): Integrate HRA web components into your apps.
          - [Design System](https://docs.humanatlas.io/dev/design-system): Maintain design consistency across all HRA apps.
  - component: PageSection
    tagline: Common issues and solutions
    anchor: common-issues-and-solutions
    level: 2
    content:
      - component: Markdown
        data: |
          - **Authentication errors:** Ensure your API key is valid and permissions are correctly set. Refer to the [API Reference documentation](https://docs.humanatlas.io/dev/api) for authentication examples.
          - **Data not loading:** Check your internet connection and verify that you are using the latest endpoints. Review the [Changelog documentation](https://docs.humanatlas.io/dev/changelog) for recent updates that may affect data access.
          - **UI component integration:** Follow the [Embedding Web Components documentation](https://docs.humanatlas.io/dev/web-components) for installation and usage instructions. If issues persist, consult the troubleshooting section or contact us.
  - component: PageSection
    tagline: Contact us
    anchor: contact-us
    level: 2
    content:
      - component: Markdown
        data: |
          Have a question, need technical support, or want to provide feedback? We’re here to help!
          - **Email:** [infoccf@iu.edu](mailto:infoccf@iu.edu)
          - **Report an issue:** [GitHub Issues](https://github.com/hubmapconsortium/hra-ui/issues/new)

          This support page is designed to evolve with your needs—please suggest improvements or additional resources that would help you and your team succeed with the Human Reference Atlas.
