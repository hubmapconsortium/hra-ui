$schema: ../../../../src/app/schemas/content-page/content-page.schema.json
title: Design System
subtitle: |
  A unified visual and interaction framework for all Human Reference Atlas applications.
icons: product:design-system
content:
  - component: PageSection
    tagline: Figma for designers
    anchor: figma
    level: 2
    content:
      - component: Markdown
        data: |
          Designers use Figma to create reusable components, patterns, and styles that ensure consistency when designing Human Reference Atlas (HRA) applications.

          The HRA Design System Figma file acts as the single source of truth for all websites and applications in the HRA app ecosystem. Designers structure this Figma file into three main elements, each organized by page for clarity and reuse:

          - [Style Guide](https://www.figma.com/design/gQEMLugLjweDvbsNNUVffD/HRA-Design-System-Repository?node-id=6977-27335&t=XzEQuK8OAk0GjIUE-4): Provides guidance on the use of colors, typefaces, logos, imagery, and overall branding to maintain design consistency
          - [Component Library](https://www.figma.com/design/gQEMLugLjweDvbsNNUVffD/HRA-Design-System-Repository?node-id=4844-22169&t=XzEQuK8OAk0GjIUE-4): A collection of user interface components, such as buttons, input fields, modals, and navigation bars
          - [Pattern Library](https://www.figma.com/design/gQEMLugLjweDvbsNNUVffD/HRA-Design-System-Repository?node-id=13531-40993&t=XzEQuK8OAk0GjIUE-4): User interface guidelines and structures used to create reusable templates for pages and applications

  - component: PageSection
    tagline: Figma component organization
    anchor: component-organization
    level: 3
    content:
      - component: Image
        src: assets/content/design-system-page/images/figma_comp_organization.png

      - component: Markdown
        data: |
          Designers organize the HRA Design System Figma file Component Library page by categories for easy navigation and developer handoff.

  - component: PageSection
    tagline: Design to development handoff
    anchor: design-to-dev
    level: 3
    content:
      - component: Markdown
        data: |
          Designers initiate a formal handoff to developers when a component or app design is ready to be built.

          1. A designer submits a GitHub issue in the [HRA-UI monorepo](https://github.com/hubmapconsortium/hra-ui) to indicate that a UI design is ready for development, with the following details:
              - A description of the specified UI design and its interactions
              - Figma links to anything relevant for implementation
              - Any accessibility, responsive behavior, and feature notes

          2. A developer uses the issue to:
              - Implement the component in code
              - Integrate it into the HRA Design System Storybook for reuse across the HRA app ecosystem

          This collaborative handoff ensures that visual fidelity, interaction behavior, and accessibility are maintained across the design and development cycle.

  - component: PageSection
    tagline: Storybook for developers
    anchor: storybook
    level: 2
    content:
      - component: Image
        src: assets/content/design-system-page/images/storybook.png

      - component: Markdown
        data: |
          Developers maintain the Human Reference Atlas Design System in Storybook, which features a documented, interactive component library. Developers can explore, test, and integrate reusable UI components consistently across all HRA apps.

          - Each component has its own page with configurable props and usage examples
          - Components align with the design patterns and color guidelines defined in Figma
          - Stories are organized by categories such as buttons, forms, navigation, and more
          - Stories are linked to their corresponding Figma designs for easy reference
