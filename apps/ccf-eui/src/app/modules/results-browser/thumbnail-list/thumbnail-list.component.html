@for (item of data(); track item.thumbnail) {
  <div hraFeature="thumbnail" class="slide">
    <a
      hraClickEvent
      class="thumbnail"
      target="_blank"
      rel="noopener noreferrer"
      [hraFeature]="item.technology ?? 'no-technology' | slugify"
      [attr.href]="item.link"
      [style.background-image]="thumbnailUrl(item)"
      (click)="linkClicked.emit(item)"
    ></a>
    <div>
      {{ item.technology }}
    </div>
  </div>
}
