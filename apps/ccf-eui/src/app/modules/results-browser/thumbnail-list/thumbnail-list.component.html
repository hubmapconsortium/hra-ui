@for (item of data(); track item) {
  @let thumbnail = item.thumbnail ? (item.thumbnail | assetUrl | cssUrl) : undefined;

  <div hraFeature="thumbnail" class="slide">
    <a
      hraClickEvent
      class="thumbnail"
      target="_blank"
      rel="noopener noreferrer"
      [hraFeature]="item.technology ?? 'no-technology' | slugify"
      [class.empty]="thumbnail === undefined"
      [style.background-image]="thumbnail"
      [attr.href]="item.link"
      (click)="linkClicked.emit(item)"
    ></a>
    <div>
      {{ item.technology }}
    </div>
  </div>
}
