  - slug: intestine-codex-stanford
    description: >-
      This dataset comprises 64 tissue sections (32 from large intestine and 32
      from small intestine) from 8 donors. The tissue samples were collected
      from eight different regions in the intestines (in order of trajectory
      from the stomach): duodenum, proximal jejunum, mid-jejunum and ileum (four
      regions in small intestine); ascending, transverse, descending and sigmoid
      (four regions in large intestine). The dataset uses CODEX imaging
      technology. All 64 datasets are normal tissue samples.
    citations:
      - >-
        Hickey, J. W. et al. Organization of the human intestine at single-cell
        resolution. Nature 619, 572–584
        https://doi.org/10.1038/s41586-023-05915-x (2023).
      - >-
