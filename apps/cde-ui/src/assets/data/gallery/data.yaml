  - slug: colon-cycif-sorgerlab
    description: >-
      This dataset comprises 25 five micrometer-thick FFPE serial sections
      spaced 25 micrometers apart (with the exception of 4 sections that were
      serially cut) from a donor diagnosed with stage IIIb adenocarcinoma
      Colorectal Cancer (CRC). The samples underwent ten cycles of CyCIF
      resulting in 40 channels per plane/section.
    citations:
      - >-
        Lin, J.-R. et al. Multiplexed 3D atlas of state transitions and immune
        interaction in colorectal cancer. Cell 186, 363-381.e19
        https://doi.org/10.1016/j.cell.2022.12.028 (2023).
    thumbnail: thumbnails/colon-cycif-sorgerlab.png
