  - slug: pancreas-geomx-ufl
    description: >-
      This dataset comprises 12 pancreas tissue sections from three donors. The
      donors represent an 18-year-old male, a 39-year-old female, and a 21 year
      old female. The tissue samples were collected from four different regions
      in the pancreas (in order of trajectory): head, neck, body, and tail. The
      samples were stained using multiplex immunofluorescence and acquired via
      GeoMx imaging using a 3-plex antibody panel according to published
      protocol. All 12 datasets are normal tissue samples.
