  - slug: bonemarrow-codex-chop
    description: >-
      This dataset comprises 20 tissue sections from the bone marrow in the head
      of femur: 12 from normal (NBM) samples, 5 from acute myeloid leukemia
      (AML), and 3 from Negative lymphoma staging bone marrow biopsies (NSM).
      The samples were acquired via CODEX imaging.
    citations:
      - >-
        Bandyopadhyay, S. et al. Mapping the cellular biogeography of human bone
        marrow niches using singlecell transcriptomics and proteomic imaging.
        Cell 187, 3120-3140.e29 https://doi.org/10.1016/j.cell.2024.04.013
        (2024).
