  - slug: oralcavity-codex-czi
    description: >-
      This dataset comprises 13 tissue sections from the mouth (also called oral
      cavity). The tissue samples were collected from 5 different regions in the
      mouth: Buccal Mucosa and Minor Salivary Glands (two datasets), Gingiva
      (two datasets), Parotid (four datasets), Submandibular (two datasets), and
      Tongue (three datasets). The samples were acquired via PhenoCycler Fusion
      imaging. All 13 datasets are normal tissue samples.
    citations:
      - >-
        Easter, Q. T. et al. Single-cell and spatially resolved interactomics of
        tooth-associated keratinocytes in periodontitis. Nat. Commun. 15, 5016
        https://doi.org/10.1038/s41467-024-49037-y (2024).
      - >-
        Matuck, B. F. et al. The Immunoregulatory Architecture of the Adult Oral
        Cavity. 2024.12.01.626279 Preprint at
        https://doi.org/10.1101/2024.12.01.626279 (2024).
      - >-
        Huynh, K. L. A. et al. Deconvolution of cell types and states in spatial
        multiomics utilizing TACIT. Nat. Commun. 16, 3747
        https://doi.org/10.1038/s41467-025-58874-4 (2025).
    thumbnail: thumbnails/oralcavity-codex-czi.png
    authors: Lab of Oral & Craniofacial Innovation
    affiliations: Viginia Commonwealth University
    consortium: CZI
    organName: Oral cavity
    technology: CODEX
    euiUrl: ''
    publications:
      - https://doi.org/10.1038/s41467-024-49037-y
      - https://doi.org/10.1101/2024.12.01.626279
      - https://doi.org/10.1038/s41467-025-58874-4
    cellCount: 1412189
