  - slug: skin-confocal-sorgerlab
    description: >-
      This dataset comprises two regions sampled from the same formalin-fixed
      paraffin embedded (FFPE) specimen and donor. The regions were profiled by
      CyCIF and imaged by high resolution 3D imaging over 170 z-planes on a
      laser scanning confocal microscope (Zeiss LSM980 fitted with 40x/1.3NA oil
      immersion objective lens). The specimen was uniquely cut at ~25 microns
      (unlike the traditional 5 microns), thereby allowing analysis of multiple
      layers of complete cell volumes in the z (vertical) axis. The images were
      sampled at 140 nm (x,y lateral resolution) and 280 nm (z axial
      resolution). One dataset is from an invasive margin (i.e., an area of
      tissue at the edge of a skin cancer where the tumor cells have started to
      invade and spread into surrounding healthy tissue) and the other dataset
      is from a melanoma in situ region (a much earlier manifestation of
      melanoma whereby usually diagnosed by the increase in number of
      melanocytes under the epidermis). Both datasets–taken from regions
      separated by a distance of approximately 1.5 cm along the skin–are true 3D
      samples prepared and acquired at the same time to reduce batch and
      operator effects. Datasets were segmented and gated by cell type based on
      mean intensity of protein expression.
    citations:
      - >-
        Yapp, Clarence, et al. "Highly multiplexed 3D profiling of cell states
        and immune niches in human tumors." Nature Methods
        https://doi.org/10.1038/s41592-025-02824-x (2025): 1-14.
    thumbnail: thumbnails/skin-confocal-sorgerlab.png
    authors: Sorger Lab
    affiliations: Harvard Medical School
    consortium: HTAN
    organName: Skin
    technology: Confocal Microscopy
