<ng-container hraFeature="file-upload">
  @if (!file && errorMessage()) {
    <hra-error-indicator [errors]="[errorMessage(), errorActionMessage()]" />
  }

  @if (file && !errorMessage()) {
    <hra-delete-file-button hraFeature="delete" hraClickEvent [fileName]="file.name" (cancelLoad)="cancelLoad()" />
  } @else {
    <button
      mat-flat-button
      class="upload"
      hraPrimaryButton
      hraButtonSize="large"
      hraFeature="upload"
      hraClickEvent
      (click)="fileInput.click()"
    >
      Upload CSV
    </button>
    <input
      type="file"
      style="display: none"
      name="fileInput"
      data-testid="file-upload"
      [attr.accept]="accept()"
      (change)="load(fileInput)"
      #fileInput
    />
  }
</ng-container>
