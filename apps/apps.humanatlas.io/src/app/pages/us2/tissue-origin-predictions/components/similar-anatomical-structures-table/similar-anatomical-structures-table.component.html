<hra-workflow-card
  hraFeature="similar-anatomical-structures"
  tagline="Similar Anatomical Structures"
  class="table-container"
>
  <hra-workflow-card-actions>
    <button
      hraClickEvent
      mat-icon-button
      class="similar-anatomical-structures-menu-trigger"
      aria-label="Open table action menu"
      [matMenuTriggerFor]="optionsForAnatomicalTable"
    >
      <mat-icon class="more-icon" fontIcon="more_vert" />
    </button>

    <!-- MENU -->
    <mat-menu hraFeature="menu" class="custom-menu" #optionsForAnatomicalTable="matMenu">
      <button
        hraHoverEvent
        hraFeature="info"
        mat-menu-item
        matRipple
        matRippleColor="#201E3D14"
        [matMenuTriggerFor]="submenu"
      >
        <mat-icon fontIcon="info" class="icon-style" />
        Info
        <mat-icon class="expand-arrow">arrow_right</mat-icon>
      </button>
      <button hraFeature="download-csv" hraClickEvent mat-menu-item (click)="onDownloadCSVButtonClicked()">
        <mat-icon>download</mat-icon>
        CSV
      </button>
    </mat-menu>

    <mat-menu #submenu="matMenu">
      <hra-tooltip-card class="tooltip-panel" [content]="tooltip" />
    </mat-menu>
  </hra-workflow-card-actions>

  <!-- ANATOMICAL STRUCTURES TABLE -->
  <ng-scrollbar class="table-overflow-container">
    <table hraFeature="predictions" mat-table matSort class="predictions-table" [dataSource]="dataSource">
      <caption>
        Table displaying similar anatomical structures
      </caption>

      <ng-container matColumnDef="tool">
        <th *matHeaderCellDef mat-header-cell mat-sort-header sortActionDescription="Sort by Tool">Tool</th>
        <td *matCellDef="let element" mat-cell>{{ element.tool }}</td>
      </ng-container>
      <ng-container matColumnDef="modality">
        <th *matHeaderCellDef mat-header-cell mat-sort-header sortActionDescription="Sort by Modality">Modality</th>
        <td *matCellDef="let element" mat-cell>{{ element.modality }}</td>
      </ng-container>
      <ng-container matColumnDef="similarity">
        <th *matHeaderCellDef mat-header-cell mat-sort-header sortActionDescription="Sort by Similarity">Similarity</th>
        <td *matCellDef="let element" mat-cell class="similarity-column">
          {{ element.similarity | number: '1.0-2' }}
        </td>
      </ng-container>
      <ng-container matColumnDef="cell_source_label">
        <th
          *matHeaderCellDef
          mat-header-cell
          mat-sort-header
          sortActionDescription="Sort by Anatomical Structure Label"
        >
          Anatomical Structure Label
        </th>
        <td *matCellDef="let element" mat-cell>{{ element.cell_source_label }}</td>
      </ng-container>
      <ng-container matColumnDef="cell_source">
        <th *matHeaderCellDef mat-header-cell mat-sort-header sortActionDescription="Sort by Anatomical Structure ID">
          Anatomical Structure ID
        </th>
        <td *matCellDef="let element" mat-cell>
          <a hraHyperlink [href]="element.cell_source">{{ element.cell_source }}</a>
        </td>
      </ng-container>

      <tr *matHeaderRowDef="displayedColumns; sticky: true" mat-header-row></tr>
      <tr *matRowDef="let row; columns: displayedColumns" mat-row></tr>
    </table>
  </ng-scrollbar>
</hra-workflow-card>
