<ng-container hraFeature="asctb-reporter">
  <mat-drawer-container style="height: 100%">
    <mat-drawer
      class="right-sidenav"
      mode="over"
      position="end"
      autoFocus="false"
      style="z-index: 3"
      [opened]="(il$ | async) || (report$ | async) || (dl$ | async) || (c$ | async)"
      (closedStart)="toggleSideNav()"
      #rightDrawer
    >
      <app-report
        *ngIf="report$ | async"
        [compareData]="allCompareData$"
        [inputReportData]="rd$"
        [sheetData]="data"
        [asFullData]="(fullAsData$ | async) ?? []"
        [fullDataByOrgan]="(fullDataByOrgan$ | async) ?? []"
        [currentSheet]="sheet"
        [currentSheetConfig]="sheetConfig$"
        [linksData$]="links$"
        [bmType]="(bmType$ | async) ?? ''"
        [hideReportCompareTab]="(mode$ | async) === 'playground'"
        (deleteSheet)="deleteSheet($event)"
        (closeReport)="rightDrawer.close()"
        (computedReport)="updateReport($event)"
      />

      <app-indent
        *ngIf="il$ | async"
        [sheetData]="data"
        [currentSheet]="sheet"
        (closeIL)="rightDrawer.close()"
        (openBottomSheet)="getStructureInfo($event)"
      />

      <app-debug-logs
        *ngIf="dl$ | async"
        [currentSheet]="sheet"
        [logs]="(logs$ | async)!"
        (closeDebug)="rightDrawer.close()"
      />

      <app-compare
        *ngIf="c$ | async"
        class="compare-sidenav"
        [compareSheets]="compareSheets$"
        (closeCompare)="rightDrawer.close()"
        (compareData)="compareData($event)"
      />
    </mat-drawer>
    <mat-drawer-content>
      <hra-header hraFeature="header" [breadcrumbs]="crumbs() ?? []">
        <a
          mat-icon-button
          hraClickEvent
          hraFeature="asctb-table-metadata"
          hraPlainTooltip="ASCT+B Table metadata"
          [matMenuTriggerFor]="nestedMenu.childMenu"
        >
          <mat-icon>table</mat-icon>
        </a>
        @if (!appControlsEnabled()) {
          <a
            mat-icon-button
            hraClickEvent
            hraFeature="view-in-knowledge-graph"
            hraPlainTooltip="View in Knowledge Graph"
            href="https://lod.humanatlas.io/asct-b"
            target="_blank"
          >
            <mat-icon>database</mat-icon>
          </a>
          <a
            mat-icon-button
            hraClickEvent
            hraFeature="github-repo"
            hraPlainTooltip="GitHub repository"
            href="https://github.com/hubmapconsortium/hra-ui"
            target="_blank"
          >
            <mat-icon svgIcon="social:github" />
          </a>
        } @else {
          <button
            mat-icon-button
            hraClickEvent
            hraFeature="toggle-playground-mode"
            [hraPlainTooltip]="mode() === 'vis' ? 'Launch Playground' : 'Exit Playground'"
            (click)="toggleMode()"
          >
            <mat-icon>{{ mode() === 'vis' ? 'playground_2' : 'exit_to_app' }}</mat-icon>
          </button>
          <button
            mat-icon-button
            hraClickEvent
            hraFeature="view-indented-list"
            hraPlainTooltip="View indented list"
            (click)="toggleIndentedList()"
          >
            <mat-icon>format_indent_increase</mat-icon>
          </button>
          <button
            mat-icon-button
            hraClickEvent
            hraFeature="upload-data-compare"
            hraPlainTooltip="Upload data to compare to ASCT+B tables"
            (click)="openCompare()"
          >
            <mat-icon>compare_arrows</mat-icon>
          </button>
          <button
            mat-icon-button
            hraClickEvent
            hraFeature="view-statistics"
            hraPlainTooltip="View statistics"
            (click)="toggleReport()"
          >
            <mat-icon>bar_chart</mat-icon>
          </button>
          <button
            mat-icon-button
            hraClickEvent
            hraFeature="view-download-options"
            hraPlainTooltip="View download options"
            [matMenuTriggerFor]="downloadMenu"
          >
            <mat-icon>download</mat-icon>
          </button>
        }
        <hra-help-button [action]="helpMenu" />
      </hra-header>

      <app-table-nested-menu [sheetDetails]="(configService.allSheetConfigurations$ | async) ?? []" #nestedMenu />

      <!-- LATER: Refactor into one shared menu component -->
      <mat-menu class="help-menu" hraFeature="help-menu" #helpMenu="matMenu">
        <a
          mat-menu-item
          href="https://humanatlas.io/asctb-reporter"
          hraClickEvent
          hraFeature="app-guide"
          target="_blank"
        >
          <div class="title">ASCT+B Reporter</div>
          <div class="description">App guide & documentation</div>
        </a>
        <mat-divider />
        <a
          mat-menu-item
          href="https://humanatlas.io/asctb-tables"
          hraClickEvent
          hraFeature="asctb-tables"
          target="_blank"
        >
          <div class="title">ASCT+B Tables</div>
          <div class="description">Data documentation</div>
        </a>
        <a
          mat-menu-item
          href="https://humanatlas.io/omap"
          hraClickEvent
          hraFeature="organ-mapping-antibody-panels"
          target="_blank"
        >
          <div class="title">Organ Mapping Antibody Panels</div>
          <div class="description">Data documentation</div>
        </a>
        <mat-divider />
        <a
          mat-menu-item
          href="https://humanatlas.io/publications"
          hraClickEvent
          hraFeature="publications"
          target="_blank"
          >Read publications</a
        >
        <mat-divider />
        <a mat-menu-item hraHoverEvent hraFeature="hubmap-menu" [matMenuTriggerFor]="hubmapMenu">
          Human Biomolecular Atlas Program (HuBMAP)
          <mat-icon class="expand-arrow">arrow_right</mat-icon>
        </a>
      </mat-menu>

      <mat-menu #hubmapMenu="matMenu">
        <a
          mat-menu-item
          href="https://hubmapconsortium.org/wp-content/uploads/2020/06/DUA_FINAL_2020_02_03_for_Signature.pdf"
          hraClickEvent
          hraFeature="terms-and-conditions"
          target="_blank"
          >Terms and conditions</a
        >
        <a
          mat-menu-item
          href="https://hubmapconsortium.org/policies"
          hraClickEvent
          hraFeature="policies"
          target="_blank"
          >Policies</a
        >
      </mat-menu>

      <mat-menu #downloadMenu="matMenu">
        <button
          *ngFor="let option of imgOptions"
          mat-menu-item
          hraClickEvent
          [hraFeature]="`download.${option}`"
          (click)="exportImage(option)"
        >
          {{ option }}
        </button>
      </mat-menu>

      <router-outlet />
    </mat-drawer-content>
  </mat-drawer-container>
</ng-container>
