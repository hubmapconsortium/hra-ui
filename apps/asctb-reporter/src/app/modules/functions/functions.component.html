<div hraFeature="visualization-controls-functions">
  <div class="title">Visualization controls</div>

  <div class="content">
    <!-- Cell Type Controls -->
    <div class="vis-controls" hraFeature="cell-type">
      <div class="control-title">Cell types</div>
      <div class="filters">
        <mat-form-field>
          <mat-label>Sort</mat-label>
          <mat-select
            hraFeature="sort"
            hraClickEvent
            disableRipple
            panelClass="options-container"
            panelClass="cell-types-panel"
            [disabled]="error.hasError"
            [value]="(config$ | async)?.CT?.sort"
            [hideSingleSelectionIndicator]="true"
            (selectionChange)="changeOptions('CT', 'sort', $event)"
          >
            <mat-option *ngFor="let option of sortOptions" hraClickEvent [hraFeature]="option" [value]="option">
              {{ option }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Size</mat-label>
          <mat-select
            hraFeature="size"
            hraClickEvent
            disableRipple
            panelClass="options-container"
            panelClass="cell-types-panel"
            [disabled]="error.hasError"
            [value]="(config$ | async)?.CT?.size"
            [hideSingleSelectionIndicator]="true"
            (selectionChange)="changeOptions('CT', 'size', $event)"
          >
            <mat-option *ngFor="let option of ctSizeOptions" hraClickEvent [hraFeature]="option" [value]="option">
              {{ option }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <!-- Biomarkers Controls -->
    <div class="vis-controls" hraFeature="biomarkers">
      <div class="control-title">Biomarkers</div>
      <div class="filters">
        <mat-form-field>
          <mat-label>Sort</mat-label>
          <mat-select
            hraFeature="sort"
            hraClickEvent
            disableRipple
            panelClass="options-container"
            panelClass="cell-types-panel"
            [disabled]="error.hasError"
            [value]="(config$ | async)?.BM?.sort"
            [hideSingleSelectionIndicator]="true"
            (selectionChange)="changeOptions('BM', 'sort', $event)"
          >
            <mat-option *ngFor="let option of sortOptions" hraClickEvent [hraFeature]="option" [value]="option">
              {{ option }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Size</mat-label>
          <mat-select
            hraFeature="size"
            hraClickEvent
            disableRipple
            panelClass="options-container"
            panelClass="cell-types-panel"
            [disabled]="error.hasError"
            [value]="(config$ | async)?.BM?.size"
            [hideSingleSelectionIndicator]="true"
            (selectionChange)="changeOptions('BM', 'size', $event)"
          >
            <mat-option *ngFor="let option of bmSizeOptions" hraClickEvent [hraFeature]="option" [value]="option">
              {{ option }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="filters">
        <mat-form-field class="full-width">
          <mat-label>Biomarker type</mat-label>
          <mat-select
            hraFeature="type"
            hraClickEvent
            disableRipple
            panelClass="options-container"
            panelClass="cell-types-panel"
            [disabled]="error.hasError"
            [value]="(config$ | async)?.BM?.type"
            [hideSingleSelectionIndicator]="true"
            (selectionChange)="changeOptions('BM', 'type', $event)"
          >
            <mat-option *ngFor="let option of bimodalBTypeOptions" hraClickEvent [hraFeature]="option" [value]="option">
              {{ option }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <!-- OMAP Controls -->
    <div class="vis-controls" hraFeature="omap">
      <div class="control-title">Organ Mapping Antibody Panels filters</div>
      <div class="filters">
        <mat-button-toggle-group
          hraButtonToggleSize="medium"
          class="full-width"
          multiple="true"
          hideMultipleSelectionIndicator="false"
        >
          <mat-button-toggle
            hraFeature="organs-only"
            hraClickEvent
            [checked]="omaps.organsOnly"
            (change)="
              handleOMAPOptionToggle({
                organsOnly: !omaps.organsOnly,
                proteinsOnly: omaps.proteinsOnly,
              })
            "
            >Organs only</mat-button-toggle
          >
          <mat-button-toggle
            hraFeature="proteins-only"
            hraClickEvent
            [checked]="omaps.proteinsOnly"
            (change)="
              handleOMAPOptionToggle({
                proteinsOnly: !omaps.proteinsOnly,
                organsOnly: omaps.organsOnly,
              })
            "
            >Proteins only</mat-button-toggle
          >
        </mat-button-toggle-group>
      </div>
    </div>
  </div>
</div>
