<div class="h-100 w-100">
  <app-navbar [cache]="(getFromCache$ | async) ?? false" />
  <mat-drawer-container class="control-pane-container h-100" autosize>
    <mat-drawer class="control-pane" mode="side" [opened]="pane$ | async" #controlPaneDrawer>
      <app-control-pane [error]="error" />
    </mat-drawer>

    <mat-drawer-content>
      <div id="content" class="h-100 w-100">
        @let mode = mode$ | async;
        @if (mode === 'vis') {
          <div class="tree-div" data-testid="view-tree" #treeDiv>
            @if (!error.hasError) {
              <app-tree />
            } @else {
              <app-error data-testid="view-error" [error]="error" #appError />
            }
          </div>
        } @else if (mode === 'playground') {
          <div class="playground-dig" data-testid="view-playground">
            <app-playground />
          </div>
        }
      </div>
    </mat-drawer-content>
  </mat-drawer-container>
</div>
