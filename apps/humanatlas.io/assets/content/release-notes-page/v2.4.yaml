title: Release Notes
subtitle: What's new in the Human Reference Atlas.
headerContent:
  component: ReleaseNotesVersionSelector
content:
  - component: PageSection
    tagline: '10th Release (v2.4): December 15, 2025'
    anchor: announcement
    level: 2
    content:
      - component: Markdown
        data: |
          HuBMAP's Indiana University Mapping Component (MC-IU) has published the 10th Release of the Human Reference Atlas
          in close collaboration with the HuBMAP team and experts from more than 25 other consortia and teams. Users can now
          query and explore 4,810 anatomical structures, 1,334 cell types, and 2,070 biomarkers linked to ontologies (Uberon/FMA, CL, and HGNC respectively) across scales. Every six months, a new version of Human Reference Atlas data and code is released with user interfaces that make it possible to visually explore the atlas or programmatically access the data. Learn more in our *Nature Methods* publication entitled “[Human BioMolecular Atlas Program (HuBMAP): 3D Human Reference Atlas construction and usage](https://doi.org/10.1038/s41592-024-02563-5)”.

  - component: PageSection
    tagline: Data
    anchor: data
    level: 2
    content:
      - component: Markdown
        data: |
          The Human Reference Atlas now includes:
            * 34 ASCT+B tables with
              * 4,810 anatomical structures linked to Uberon/FMA
              * 1,334 cell types linked to Cell Ontology (CL)
              * 2,070 biomarkers linked to HGNC
            * 26 functional tissue unit illustrations
            * 77 3D reference objects with 1,469 3D anatomical structures
            * 37 organ mapping antibody panels
            * 7 Vasculature Common Coordinate Framework (VCCF) tables
            * 12 crosswalk tables from 3D reference organs, cell type annotation crosswalks, functional tissue unit illustrations to ASCT+B tables

      - component: Button
        label: Get data
        href: https://purl.humanatlas.io/collection/hra/v2.4
        type: cta

