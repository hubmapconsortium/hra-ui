  - component: PageSection
    tagline: Updated ontologies
    anchor: ontology-updates
    level: 3
    content:
      - component: Markdown
        data: |
          Existing ontologies do not (yet) properly represent healthy anatomical structures and cell types. HuBMAP and other teams are
          actively adding anatomical structure terms and axiom links to Uberon and novel cell types to Cell Ontology (CL) and the Provisional
          Cell Ontology (PCL) and to improve the quality and coverage of these ontologies.

      - component: PageTable
        style: alternating
        columns:
          - column: ontology
            label: Ontology
          - column: published
            label: Last published release
            type:
              type: link
              urlColumn: publishedUrl
          - column: termsAdded
            label: Terms Added
            type:
              type: numeric
          - column: axiomsAdded
            label: Axioms Added
            type:
              type: numeric
        rows:
          - ontology: Uberon
            published: Uberon v2025-12-05
            publishedUrl: https://github.com/obophenotype/uberon/releases/tag/v2025-12-04
            termsAdded: 198
            axiomsAdded: 931
          - ontology: CL
            published: CL v2025-11-27
            publishedUrl: https://github.com/obophenotype/cell-ontology/releases/tag/v2025-11-27
            termsAdded: 233
            axiomsAdded: 555
          - ontology: PCL
            published: PCL v2025-07-08
            publishedUrl: https://github.com/obophenotype/provisional_cell_ontology/releases/tag/v2025-07-08
            termsAdded: 468
            axiomsAdded: 468

  - component: PageSection
    tagline: Applications
    anchor: applications
    level: 2
    content:
      - component: PageSection
        tagline: 'New app: Knowledge Graph'
        anchor: new-app-kg
        level: 3
        content:
          - component: Markdown
            data: |
              Introducing a new application to search, query, and download all data organized in the Human Reference Atlas Knowledge Graph.

              Check out all resources to learn more about this effort:

              * **Explore the app:** [Knowledge Graph](https://lod.humanatlas.io)
              * **New help & documentation content:**
                * [App documentation](https://docs.humanatlas.io/apps/kg): Start here, then go to the developer documentation when you areready to work with the data programmatically
                * [Developer documentation](https://docs.humanatlas.io/dev/kg)
              * **Read publication:** Bueckle, Andreas, Bruce W. Herr II, Josef Hardi, Ellen M Quardokus, Mark A. Musen, and Katy Börner. 2025\. ["Construction, Deployment, and Usage of the Human Reference Atlas Knowledge Graph"](https://www.nature.com/articles/s41597-025-05183-6). *Nature Scientific Data* doi: 10.1038/s41597-025-05183-6.

      - component: PageSection
        tagline: 'New app: HRApop Visualizer'
        anchor: new-app-hrapop-vis
        level: 3
        content:
          - component: Markdown
            data: |
              This new tool enables users to visualize the number and percentage of cells per cell type for 73 anatomical structures (112 when sex-specific) across 17 organs (31 when sex-specific). These cell type populations are separated by organ, sex, cell type annotation tool, and entity (anatomical structure, extraction site, dataset).

              * **Explore the app:** [HRApop Visualizer](https://apps.humanatlas.io/hra-pop-visualizer)
              * **Watch tutorial on YouTube:** [Visualizing HRA Cell Type Populations](https://www.youtube.com/watch?v=Ueei7BOctzY)
              * **Read publication:** Bueckle, Andreas, Bruce W Herr II, Lu Chen, Daniel Bolin, Danial Qaurooni, Michael Ginda, Yashvardhan Jain, Aleix Puig-Barbe, Kristin Ardlie, Fusheng Wang, and Katy Börner. 2025\. ["Cell type populations for 3D anatomical structures of the Human Reference Atlas"](https://www.biorxiv.org/content/10.1101/2025.08.14.670406). *bioRxiv* doi: 10.1101/2024.12.13.628309.

