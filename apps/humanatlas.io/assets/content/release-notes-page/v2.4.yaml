          3. [Cell Distance Explorer](https://apps.humanatlas.io/cde/): Added global navigation
          4. [Cell Population Graphs](https://apps.humanatlas.io/cell-population-graphs): Redesigned app
          5. [Cell Population Predictor](https://apps.humanatlas.io/us1): Added 10th release data
          6. [Dashboard](https://apps.humanatlas.io/dashboard/): Added 10th release data and improved tooltip experience
          7. [Exploration User Interface](https://apps.humanatlas.io/eui/): Added 10th release data
          8. [Functional Tissue Unit Explorer](https://apps.humanatlas.io/ftu-explorer/): Added 10th release data and redesigned the app
          9. [Help & Documentation](https://docs.humanatlas.io/): Added 10th release data and updated content
          10. [HRA Organ Gallery](https://humanatlas.io/hra-organ-gallery): Added 10th release data and new features
          11. [Registration User Interface](https://apps.humanatlas.io/rui/): Added 10th release data
          12. [Tissue Origin Predictor](https://apps.humanatlas.io/us2): Added 10th release data
          13. [Web Components](https://apps.humanatlas.io/us6): Added 10th release data

  - component: PageSection
    tagline: Other Updates
    anchor: other-updates
    level: 2
    content:
      - component: PageSection
        tagline: 'SenNet collaborations'
        anchor: sennet-collaborations
        level: 3
        content:
          - component: Markdown
            data: |
              [Yashvardhan Jain](https://orcid.org/0000-0002-6300-5568) is leading the VCCF Vis effort that uses five CODEX Lymph Node datasets from
              [Rong Fan](https://orcid.org/0000-0001-7805-8059)'s SenNet team. The effort aims to analyze and visualize cell-to-nearest-endothelial-cell
              distance distributions across datasets.

          - component: Image
            src: assets/content/release-notes-page/images/v2.4/cde.jpg
            alt: Nancy posing with the butterfly visualization at the SenNet All-Hands Meeting 2025

          - component: Markdown
            data: |
              Cell-to-nearest-endothelial-cell distance visualization of a lymph node dataset containing 3,158,210 cells in the
              [Cell Distance Explorer app](https://apps.humanatlas.io/cde).

      - component: PageSection
        tagline: Cellular Senescence Network (SenNet) SciTech Webinar Series featuring HRA Knowledge Graph
        anchor: sennet-webinar
        level: 3
        content:
          - component: Markdown
            data: |
              [Andreas Bueckle](https://orcid.org/0000-0002-8977-498X) and [Bruce W. Herr II](https://orcid.org/0000-0002-6703-7647) present their work on the Human Reference Atlas.

          - component: YouTubePlayer
            videoId: -9_1GVB-iuE
            label: Cellular Senescence Network (SenNet) SciTech Webinar Series featuring HRA Knowledge Graph

      - component: PageSection
        tagline: SenNet co-author network for 2021-2025
        anchor: sennet-co-author-network
        level: 3
        content:
          - component: Markdown
            data: |
              [Michael Ginda](https://orcid.org/0000-0002-7500-8096) at MC-IU computed various data visualizations to communicate [SenNet](https://sennetconsortium.org/) progress
              and impact using funding, publication, and experimental biomarkers data. Visualizations include an overview of SenNet funding over time, evolving co-authorship networks,
              an initial and final organ and biomarkers bi-modal network, and a publication MeSH descriptors co-occurrence network that show topical coverage of SenNet works.

          - component: Image
            src: assets/content/release-notes-page/images/v2.4/sennet-coauthorship_network-2021_2025.gif
            alt: Nancy posing with the butterfly visualization at the SenNet All-Hands Meeting 2025

          - component: Markdown
            data: |
              SenNet co-author network for 2021-2025.

              The network shown represents co-authorship relationships derived from 336 scholarly articles published by the SenNet team between 2021-2025. There are 609 researchers who are
              represented as circles (nodes) in the network, and who are authors on at least two SenNet publications between 2021 & 2025. There are 64 researchers who have contributed to 6 or
              more articles—these individuals are highlighted with purple nodes and labels. There are 6,763 relationships between pairs of researchers which are shown as lines (edges).

      - component: PageSection
        tagline: 'New video: 1010 — A Multiscale Voyage through the Human Body'
        anchor: new-video-multiscale-voyage
        level: 3
        content:
          - component: Markdown
            data: |
              This short animation is both an exciting journey through the human body and a vivid showcase for some of the fascinating data and imagery generated by the Human Reference Atlas (HRA).
              After a brief homage to some of the great anatomical drawings of the past, our journey begins at the level of the adult human body. From there, we move through increasing levels of
              magnification—zooming in by powers of 10—to view the anatomical structures, functional tissue units, cells, organelles, ribosomes, and amino acid chains that become visible at each new level.
              As we move to magnification strengths that have only recently become technologically possible, the human anatomy we encounter appears even more strange and wondrous. In the end, we zoom back out
              to the familiar body view, but we arrive there with an awareness of the amazing worlds that exist within the multiscale human body.

              All data and code used to create the video is freely available.

          - component: TextHyperlink
            text: Learn more
            url: https://cns-iu.github.io/cns-multiscale-voyage
            icon: arrow_right_alt

          - component: YouTubePlayer
            videoId: -YNP5XdnLPA
            label: 'New video: 1010 — A Multiscale Voyage through the Human Body'

          - component: Markdown
            data: |
              #### Credits

               * Producer (Initial Story / Guidance / Resources): Katy Börner, Luddy School of Informatics, Computing, and Engineering, Indiana University
               * Director (Animation / Art / Design / Editing): Ushma Patel, Indiana University
               * Animator / Programmer: Andreas Bueckle, Luddy School of Informatics, Computing, and Engineering, Indiana University
               * Story Advisor: Todd N. Theriault, Luddy School of Informatics, Computing, and Engineering, Indiana University
               * Sound Artist (Music / Soundtrack): Norbert Herber, Department of Telecommunications, Indiana University
               * 2D and 3D FTUs: Rachel Bajema, Heidi Schlehlein, and Supriya Bidanta, Luddy School of Informatics, Computing, and Engineering, Indiana University
               * FTU Images Extraction Programmer: Kiki Kong, Luddy School of Informatics, Computing, and Engineering, Indiana University
               * Helios-Web Programmer: Filipi Nascimento Silva, Northwestern University–Kellogg
               * Mosaic and Grid Animation Programmer: Parth Godse, Luddy School of Informatics, Computing, and Engineering, Indiana University
               * Sphere Animation Programmer: Peter Kienle, Luddy School of Informatics, Computing, and Engineering, Indiana University

          - component: Image
            src: assets/content/release-notes-page/images/v2.4/sennet-coauthorship_network-2021_2025.gif
            alt: Nancy posing with the butterfly visualization at the SenNet All-Hands Meeting 2025

          - component: Markdown
            data: |
              SenNet co-author network for 2021-2025.

              The network shown represents co-authorship relationships derived from 336 scholarly articles published by the SenNet team between 2021-2025. There are 609 researchers who are
              represented as circles (nodes) in the network, and who are authors on at least two SenNet publications between 2021 & 2025. There are 64 researchers who have contributed to 6 or
              more articles—these individuals are highlighted with purple nodes and labels. There are 6,763 relationships between pairs of researchers which are shown as lines (edges).

      - component: PageSection
        tagline: 'Andreas Bueckle appears on CFDE “Decoding the Data Ecosystem” Podcast'
        anchor: decoding-the-data-ecosystem
        level: 3
        content:
          - component: Markdown
            data: |
              Andreas Bueckle, Ph.D., appeared on the CFDE podcast with host Dr. Allissa Dillmann. This marked the first instance of a video episode in the series. Dr. Bueckle presented the ongoing work to make HuBMAP, SenNet, and GTEx datasets more [Findable, Accessible, Interoperable, and Reusable (FAIR)](https://doi.org/10.1038/sdata.2016.18) with the [HRA Organ Gallery](https://humanatlas.io/hra-organ-gallery) in virtual reality.

          - component: TextHyperlink
            text: Watch on Vimeo
            url: https://vimeo.com/1143496413
            icon: arrow_right_alt

      - component: PageSection
        tagline: 'HuBMAP Human Reference Atlas Workshop: June 23-24, 2025'
        anchor: hra-workshop-june-2025
        level: 3
        content:
          - component: Image
            src: assets/content/release-notes-page/images/v2.4/2025-06-23_hra_workshop.png
            alt: 'HuBMAP Human Reference Atlas Workshop: June 23-24, 2025'

          - component: Markdown
            data: |
              This workshop brought together experts from the National Library of Medicine, the J. Craig Venter Institute (JCVI),
              and HuBMAP to share and integrate human atlas data and code across efforts.

          - component: TextHyperlink
            text: Learn more
            url: https://cns-iu.github.io/workshops/2025-06-23_hra_workshop/
            icon: arrow_right_alt

      - component: PageSection
        tagline: 'HuBMAP Human Reference Atlas Hackathon: August 25-26, 2025'
        anchor: hra-hackathon-august-2025
        level: 3
        content:
          - component: Image
            src: assets/content/release-notes-page/images/v2.4/2025-08-25_hra_hackathon.png
            alt: 'HuBMAP Human Reference Atlas Hackathon: August 25-26, 2025'

          - component: Markdown
            data: |
              This hackathon brought together experts from the Kidney Precision Medicine Project (KPMP), the Human Phenotype Ontology (HPO),
              and HuBMAP to share and integrate human atlas data and code across efforts.

          - component: TextHyperlink
            text: Learn more
            url: https://cns-iu.github.io/workshops/2025-08-25_hra_hackathon/
            icon: arrow_right_alt

      - component: PageSection
        tagline: 'IEEE VIS Panel: November 5, 2025'
        anchor: ieee-vis-panel-november-2025
        level: 3
        content:
          - component: Image
            src: assets/content/release-notes-page/images/v2.4/ieee_vis_panel_nov_2025.png
            alt: 'HuBMAP Human Reference Atlas Workshop: June 23-24, 2025'

          - component: Markdown
            data: |
              TALK, TRY, TELL: Challenges and Opportunities for Theory-Grounded Data Visualization in Extended Reality was co-organized by
              Dr. Andreas Bueckle and held at IEEE VIS addressed gaps in the standardization of data visualization in extended reality (XR) through an
              innovative “TALK, TRY, TELL” format that combined theoretical discourse with hands-on experience. Five expert speakers present their own research
              on theory and practice and examine how established principles translate to immersive environments, representing a diverse and balanced spectrum
              from XR specialists and information designers, including implementers and theorists. Following the presentations, attendees engage with three
              VR demonstration applications, including the HRA Organ Gallery in VR.

          - component: TextHyperlink
            text: Learn more
            url: https://cns-iu.github.io/data-vis-xr-panel-2025/
            icon: arrow_right_alt

