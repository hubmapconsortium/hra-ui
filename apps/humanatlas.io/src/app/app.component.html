<ng-container hraFeature="humanatlas">
  <hra-header [cta]="cta" [(ctaDismissed)]="ctaDismissed" />
  <div class="main" [class.navigation-visible]="siteNavigationEnabled()" [class.cta-active]="!ctaDismissed()">
    @if (siteNavigationEnabled()) {
      <hra-site-navigation />
    }
    <div class="content">
      <router-outlet />
    </div>
  </div>
</ng-container>
