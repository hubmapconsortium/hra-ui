  - component: PageSection
    tagline: 3D printable millitome molds
    anchor: 3d-printable-millitome-molds
    level: 2
    content:
      - component: Markdown
        data: |
          The millitome protocol can use a 3D-printed mold that is designed for holding a freshly procured
          human organ and cutting it into many small tissue blocks (see [Using a Millitome](https://doi.org/10.5281/zenodo.7382703)).
          This mold has discrete, equally placed cutting grooves in three dimensions (x, y, and z) to guide a carbon steel
          cutting knife to produce standard size slices or cubes of tissue material. Millitome molds are used
          to create uniformly sized tissue blocks that match the shape and size of organs from 3D reference objects.

          The following table provides a listing of downloadable millitome mold packages, categorized by
          organ, sex, and laterality. Each package is further subdivided by sample block size (10, 15, and
          20 millimeters) and organ size (large, medium, and small). Each folder also includes six matching
          lookup tables that record data about the sample blocks taken from the organ.
