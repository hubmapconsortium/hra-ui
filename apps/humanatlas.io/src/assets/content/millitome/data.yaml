$schema: ../../../app/schemas/content-page/content-page.schema.json
title: Millitomes
subtitle: Protocol for registering human tissue at scale into HRA 3D reference objects using millitomes
icons: product:millitome
action:
  label: Get data
  url: https://purl.humanatlas.io/millitome
content:
  - component: PageSection
    tagline: Overview
    anchor: overview
    level: 2
    content:
      component: Markdown
      data: |
        The millitome defines a protocol for scaling up tissue registration by partitioning a human organ
        model and registering the resulting tissue blocks into extraction sites within the HRA three-dimensional
        (3D) reference objects. The protocol can be implemented using a 3D cutting mold. Alternatively, a
        projection can align the geometry of samples to reference objects using the [HRA AMAP](https://github.com/cns-iu/hra-amap)
        process, which also automates the assignment of tissue blocks to extraction sites.
  - component: PageSection
    tagline: Standard operating procedures (SOPs)
    anchor: standard-operating-procedures
    level: 2
    content:
      - component: Markdown
        data: |
          -  [Constructing a Millitome and Generating Virtual Tissue Blocks](https://doi.org/10.5281/zenodo.7901004)
          -  [Using a Millitome](https://doi.org/10.5281/zenodo.7382703)
