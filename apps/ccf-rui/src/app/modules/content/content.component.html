<div class="top-bar">
  @if (page.registrationStarted$ | async) {
    <ccf-spatial-search-keyboard-ui-behavior
      hraFeature="directional-controls"
      [delta]="1"
      [shiftDelta]="2"
      [position]="(position$ | async)!"
      [disablePositionChange]="disablePositionChange()"
      (changePosition)="model.setPosition($event)"
    ></ccf-spatial-search-keyboard-ui-behavior>
  }
  <hra-body-ui
    class="gizmo"
    [rotation]="gizmoRotation()[0]"
    [rotationX]="gizmoRotation()[1]"
    [scene]="(scene.gizmo$ | async)!"
    [interactive]="false"
    [zoom]="9.5"
    #gizmo
  />
</div>

<div class="main-content">
  @if ((model.viewType$ | async) === '3d') {
    <hra-body-ui
      hraFeature="3d"
      hraClickEvent
      class="body-ui"
      [scene]="(scene.nodes$ | async) ?? []"
      (rotationChange)="this.gizmoRotation.set($event)"
      [bounds]="(bounds$ | async)!"
      [zoom]="11.5"
      [interactive]="true"
      camera="perspective"
    />
  }

  @if ((model.viewType$ | async) === 'register') {
    <hra-body-ui
      hraFeature="register"
      hraClickEvent
      class="body-ui"
      [scene]="(scene.rotatedNodes$ | async) ?? []"
      [interactive]="false"
      [bounds]="(bounds$ | async)!"
      [zoom]="11.5"
      (nodeDrag)="handleNodeDrag($event)"
      camera="orthographic"
    />
  }
</div>
