<span class="label">{{ label() }}</span>
<mat-chip-listbox selectable="false" [hraFeature]="label() | slugify">
  @for (tag of tags(); track tag.id) {
    <mat-chip hraClickEvent removable disableRipple [hraFeature]="tag.label | slugify" (removed)="removeTag(tag)">
      {{ tag.label }}
      <mat-icon hraFeature="remove" hraClickEvent matChipRemove class="icon remove">close</mat-icon>
    </mat-chip>
  }
</mat-chip-listbox>
