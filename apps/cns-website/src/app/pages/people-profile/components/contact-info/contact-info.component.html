<div class="contact-info-wrapper">
  <div class="profile-picture">
    <img [src]="contactInfo().pictureUrl" [alt]="'Profile picture'" />
  </div>

  <hra-page-section class="contact-info-section" [tagline]="'Contact info'" [level]="5">
    @if (contactInfo().office) {
      <hra-page-section [tagline]="'Office'" [level]="6">
        <div class="value">{{ contactInfo().office }}</div>
      </hra-page-section>
    }

    @if (contactInfo().phone) {
      <hra-page-section [tagline]="'Phone'" [level]="6">
        <div class="value">{{ contactInfo().phone }}</div>
      </hra-page-section>
    }

    @if (contactInfo().fax) {
      <hra-page-section [tagline]="'Fax'" [level]="6">
        <div class="value">{{ contactInfo().fax }}</div>
      </hra-page-section>
    }

    @if (contactInfo().email) {
      <hra-page-section [tagline]="'Email'" [level]="6">
        <div class="value">
          <a [href]="'mailto:' + contactInfo().email">{{ contactInfo().email }}</a>
        </div>
      </hra-page-section>
    }
  </hra-page-section>
</div>
