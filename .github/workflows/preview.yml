name: Netlify Preview Deployment

on:
  workflow_run:
    workflows: ['CI']
    branches-ignore: ['main', 'develop']
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'cancelled'
    outputs:
      has-artifacts: ${{ steps.check.outputs.has-artifacts }}
    steps:
      - name: Check whether CI produced any artifacts
        id: check
        run: |
          total=$(curl -sSL\
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            $ARTIFACTS_URL | jq -r '.total_count')
          echo "has-artifacts=$([ "$total" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
        env:
          ARTIFACTS_URL: ${{ github.event.workflow_run.artifacts_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: check-artifacts
    if: ${{ needs.check-artifacts.outputs.has-artifacts == 'true' && toJSON(github.event.workflow_run.pull_requests) != '[]' }}
    env:
      ISSUE_NUMBER: ${{  github.event.workflow_run.pull_requests[0].number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: nx-build-artifacts
          path: ./deploy
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Copy static preview assets
        run: cp -r .github/assets/preview/. deploy/

      - name: Create metadata script
        run: |
          echo "preview.setIssueNumber(\"$ISSUE_NUMBER\")" >> $METADATA_FILE

          find deploy/{apps,compodoc,storybook} -mindepth 1 -maxdepth 1 -type d \
            -printf 'preview.addDirectory("%p")\n' \
            2>/dev/null >> $METADATA_FILE || true
        env:
          METADATA_FILE: deploy/metadata.js

      - name: Create redirects
        run: |
          find deploy/apps -mindepth 1 -maxdepth 1 -type d \
            -printf '/apps/%f/* /apps/%f/index.html 200\n' \
            > deploy/_redirects || true

      - name: Deploy to Netlify
        id: netlify
        run: |
          RESPONSE=$(npx netlify deploy --dir=deploy --filter=ftu-ui --no-build --json --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID)
          URL=$(echo "$RESPONSE" | jq -r '.deploy_url')

          echo $RESPONSE
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Find existing deployment comment
        id: deployment-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Preview Deploy Report'

      - name: Create or update deployment comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.deployment-comment.outputs.comment-id }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          edit-mode: replace
          body: |
            # :rocket: Preview Deploy Report

            ✅ Successfully deployed preview [here](${{ steps.netlify.outputs.url }})
