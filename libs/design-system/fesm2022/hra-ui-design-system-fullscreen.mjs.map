<ng-template [hraViewOutlet]="viewRef()" />

<ng-template #contentTemplate>
  <ng-content select="hra-fullscreen-portal-content" />
</ng-template>

<ng-template #dialogTemplate>
  <hra-expansion-panel hraFeature="fullscreen" disabled [tagline]="tagline()">
    <hra-expansion-panel-actions>
      <ng-content select="hra-fullscreen-actions" />
    </hra-expansion-panel-actions>

    <hra-expansion-panel-header-content>
      <button mat-icon-button mat-dialog-close hraFeature="close" hraClickEvent>
        <mat-icon class="material-symbols-rounded"> close </mat-icon>
      </button>
    </hra-expansion-panel-header-content>

    <ng-template data-testid="fullscreen-outlet" [hraViewOutlet]="viewRef()" />
  </hra-expansion-panel>
</ng-template>
