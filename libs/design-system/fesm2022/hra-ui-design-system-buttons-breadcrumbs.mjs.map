<nav class="navigation">
  <ol class="crumbs">
    @for (crumb of crumbs(); track $index) {
      <li class="crumb">
        @if (crumb.route) {
          <a class="label" hraHyperlink [hraLink]="crumb.route">{{ crumb.name }}</a>
        } @else {
          <span class="label">{{ crumb.name }}</span>
        }

        @if (!$last) {
          <div class="separator">/</div>
        }
      </li>
    }
  </ol>
</nav>
