<div class="component-tagline">
  <span class="component-title">{{ tagline() }}</span>
  @if (showHelpButton()) {
    <hra-help-button [action]="helpLink()" />
  }
  <div class="filler"></div>
  <button
    hraClickEvent
    hraFeature="close"
    mat-icon-button
    class="closeButton"
    aria-label="Close card"
    (click)="closeClick.emit()"
  >
    <mat-icon>close</mat-icon>
  </button>
</div>
@if (showDivider()) {
  <mat-divider class="top-divider" />
}

<div class="card-content">
  <ng-content />
</div>

@if (showButtonsFooter()) {
  <div class="card-footer">
    <ng-content select="hra-flat-card-actions" />
  </div>
}
