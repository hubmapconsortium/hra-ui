<cdk-accordion hraFeature="expansion-panel">
  <cdk-accordion-item
    tabindex="0"
    [attr.aria-expanded]="accordionItem.expanded"
    [attr.aria-controls]="bodyId"
    [expanded]="expanded()"
    #accordionItem="cdkAccordionItem"
  >
    <div class="header">
      @if (!disabled()) {
        <button
          mat-icon-button
          data-testid="toggle"
          [hraClickEvent]="{ expanded: accordionItem.expanded }"
          (click)="accordionItem.toggle()"
        >
          <mat-icon [hraPlainTooltip]="accordionItem.expanded ? 'Collapse' : 'Expand'">
            {{ accordionItem.expanded ? 'remove' : 'add' }}
          </mat-icon>
        </button>
      }

      <span class="title" [attr.id]="taglineId" [hraPlainTooltip]="tooltip()">
        {{ tagline() }}
      </span>

      <span>
        <ng-content select="hra-expansion-panel-actions" />
      </span>
      <div class="filler"></div>
      <span class="header-content">
        <ng-content select="hra-expansion-panel-header-content" />
      </span>
    </div>
    <div
      role="region"
      class="content"
      data-testid="body"
      [attr.id]="bodyId"
      [attr.aria-labelledby]="taglineId"
      [@bodyExpansion]="accordionItem.expanded ? 'expanded' : 'collapsed'"
      (@bodyExpansion.start)="animationStart($event)"
      (@bodyExpansion.done)="animationDone($event)"
      #body
    >
      <div class="expansion-body">
        <ng-content />
      </div>
    </div>
  </cdk-accordion-item>
</cdk-accordion>
