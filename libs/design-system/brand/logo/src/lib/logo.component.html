<a
  class="logo"
  hraFeature="logo"
  hraClickEvent
  target="_self"
  [attr.aria-label]="`Visit ${brandConfig().label}`"
  [href]="brandConfig().url"
  [inlineSVG]="data().src | assetUrl"
  [evalScripts]="NEVER_EVAL_SCRIPTS"
  [style.width.px]="data().width"
  [style.height.px]="data().height"
>
</a>
