@switch (type()) {
  @case ('default') {
    <a
      mat-button
      target="_blank"
      [hraButtonVariant]="variant()"
      [hraButtonSize]="size()"
      [disabled]="disabled()"
      [href]="href()"
    >
      {{ label() }}
      @if (size() !== 'small' && icon()) {
        <mat-icon>{{ icon() }}</mat-icon>
      }
    </a>
  }
  @case ('flat') {
    <a mat-flat-button target="_blank" [disabled]="disabled()" [href]="href()">
      {{ label() }}
      <mat-icon>{{ icon() }}</mat-icon>
    </a>
  }
  @case ('cta') {
    <a mat-button hraCtaButton target="_blank" [hraButtonVariant]="variant()" [disabled]="disabled()" [href]="href()">
      {{ label() }}
      <mat-icon iconPositionEnd>arrow_right_alt</mat-icon>
    </a>
  }
  @case ('fab') {
    <a mat-fab extended target="_blank" [disabled]="disabled()" [href]="href()">
      <mat-icon>{{ icon() }}</mat-icon>
      {{ label() }}
    </a>
  }
}
