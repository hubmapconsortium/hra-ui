<a matRipple matRippleColor="#201E3D1F" hraFeature="navigation-button" hraClickEvent [attr.href]="link()">
  <div class="content">
    @if (showIndent()) {
      <div class="indent"></div>
    } @else if (showLeadingIcon()) {
      <mat-icon class="leading-icon">info</mat-icon>
    }

    <div class="text-container">
      <span class="label">{{ label() }}</span>
      @if (supportingText()) {
        <span class="supporting-text">{{ supportingText() }}</span>
      }
    </div>

    @if (showTrailingicon()) {
      <mat-icon class="trailing-icon">arrow_right_alt</mat-icon>
    }
  </div>
</a>
