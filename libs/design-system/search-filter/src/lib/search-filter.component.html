<mat-form-field class="search-field" subscriptSizing="dynamic">
  <mat-label>{{ label() }}</mat-label>

  <mat-icon matPrefix>search</mat-icon>

  <input matInput type="text" aria-label="Search with filter" [(ngModel)]="search" />

  @if (search()) {
    <button matSuffix mat-icon-button aria-label="Clear search" type="button" (click)="clearSearch()">
      <mat-icon>close</mat-icon>
    </button>
  }
</mat-form-field>

<hra-results-indicator class="results-counter" description="Viewing" [value]="viewingCount()" [total]="totalCount()" />
