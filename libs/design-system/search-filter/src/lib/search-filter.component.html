<mat-form-field class="search-field" subscriptSizing="dynamic">
  <mat-label>{{ label() }}</mat-label>

  <mat-icon matPrefix>search</mat-icon>

  <input matInput type="text" aria-label="Search with filter" [formControl]="searchControl" [matAutocomplete]="auto" />

  @if (searchControl.value) {
    <button matSuffix mat-icon-button aria-label="Clear search" type="button" (click)="clearSearch()">
      <mat-icon>close</mat-icon>
    </button>
  }

  <mat-autocomplete
    [displayWith]="displayWith"
    [autoActiveFirstOption]="false"
    (optionSelected)="onOptionSelected($event.option.value)"
    #auto="matAutocomplete"
  >
    @for (option of filteredOptions(); track trackByValue($index, option)) {
      <mat-option [value]="option">
        {{ option.label }}
      </mat-option>
    }

    @if (filteredOptions().length === 0 && searchQuery()) {
      <mat-option [disabled]="true"> No results found </mat-option>
    }
  </mat-autocomplete>
</mat-form-field>

<hra-results-indicator class="results-counter" description="Viewing" [value]="viewingCount()" [total]="totalCount()" />
