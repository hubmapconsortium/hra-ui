@if (tagline() || description() || enableClose()) {
  <div hraFeature="header" class="header-section">
    <div class="drawer-header">
      <span class="drawer-title">{{ tagline() }}</span>
      <div class="filler"></div>
      @if (!isWideScreen() && enableClose()) {
        <button
          hraFeature="close"
          hraClickEvent
          hraHoverEvent
          mat-icon-button
          aria-label="Close filter menu"
          (click)="closeClick.emit()"
        >
          <hra-icon class="menu-icon" fontIcon="close" />
        </button>
      }
    </div>
    <div class="header-subtext">{{ description() }}</div>
  </div>
}

<ng-scrollbar hraScrollOverflowFade class="filter-options">
  @if (controls().length > 0) {
    <div class="customize-section">
      <div class="customize-header">
        <hra-icon class="customize-icon" fontIcon="tune" />
        <span class="customize-title">Customize</span>
      </div>
      <ng-content />
    </div>
  }

  <div class="filters-section">
    <div class="filters-header">
      <hra-icon class="filter-icon" fontIcon="filter_list" />
      <span class="filters-title">Filters</span>
    </div>
    @for (filter of filters(); track $index) {
      <hra-filter-container
        enableDivider
        cdkOverlayOrigin
        [action]="filter.label"
        [chips]="convertToChips(filter)"
        (chipsChange)="updateFiltersFromChips(filter, $event)"
        (click)="activeFilter.set(filter)"
        #filterMenuOrigin="cdkOverlayOrigin"
      />

      <ng-template
        cdkConnectedOverlay
        cdkConnectedOverlayHasBackdrop="false"
        cdkConnectedOverlayLockPosition="true"
        cdkConnectedOverlayPush="true"
        [cdkConnectedOverlayOpen]="activeFilterId() === filter.id"
        [cdkConnectedOverlayOrigin]="filterMenuOrigin"
        [cdkConnectedOverlayPositions]="filterMenuPositions"
        (overlayOutsideClick)="activeFilter.set(undefined)"
      >
        <hra-search-list
          [options]="filter?.options || []"
          [selected]="filter.selected"
          (selectedChange)="updateFilterSelection(filter, $event)"
        />
      </ng-template>
    }
  </div>
</ng-scrollbar>
