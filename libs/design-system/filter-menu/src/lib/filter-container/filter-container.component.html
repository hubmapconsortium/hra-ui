<div class="filter-container">
  <div class="top-row">
    @if (showTooltip()) {
      <hra-info-button>
        <span hraInfoButtonTagline>{{ action() }}</span>
        <ng-content select="[tooltipContent]" />
        <div hraInfoButtonActions>
          <ng-content select="[tooltipActions]" />
        </div>
      </hra-info-button>
    }
    <button
      mat-button
      hraButtonVariant="secondary"
      class="category-button"
      color="primary"
      cdkOverlayOrigin
      (click)="toggleMenu()"
      #desktopMenuOrigin="cdkOverlayOrigin"
    >
      {{ action() }}
    </button>
  </div>

  @if (chips().length > 0) {
    <mat-chip-set class="chips-container">
      @for (chip of chips(); track chip.label) {
        <mat-chip disableRipple (removed)="removeChip(chip)">
          {{ chip.label }}
          <button matChipRemove [attr.aria-label]="`Remove ${chip.label}`">
            <mat-icon>close</mat-icon>
          </button>
        </mat-chip>
      }
    </mat-chip-set>
  }

  @if (enableDivider()) {
    <mat-divider />
  }
</div>

<hra-rich-tooltip-container class="filter-menu" #content>
  <hra-rich-tooltip-content class="filter-menu-content">
    <hra-filter-list-flyout [filterOptionCategory]="filter()" />
  </hra-rich-tooltip-content>
</hra-rich-tooltip-container>

<ng-template
  cdkConnectedOverlay
  cdkConnectedOverlayHasBackdrop
  cdkConnectedOverlayBackdropClass="menu-open-backdrop"
  cdkConnectedOverlayLockPosition="true"
  cdkConnectedOverlayPush="true"
  [cdkConnectedOverlayOpen]="menuActive()"
  [cdkConnectedOverlayOrigin]="desktopMenuOrigin"
  [cdkConnectedOverlayPositions]="desktopMenuPositions"
  (overlayOutsideClick)="toggleMenu()"
>
  <hra-filter-list-flyout [filterOptionCategory]="filter()" />
</ng-template>
