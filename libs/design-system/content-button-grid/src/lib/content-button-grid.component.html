<mat-button-toggle-group
  hraFeature="category-toggle"
  [hideSingleSelectionIndicator]="false"
  class="toggle-group"
  (change)="category.set($event.value)"
>
  <mat-button-toggle hraClickEvent hraFeature="featured" value="featured" checked> Featured </mat-button-toggle>
  @for (category of buttonCategories(); track category) {
    <mat-button-toggle hraClickEvent [hraFeature]="category" [value]="category">
      {{ category | titlecase }}
    </mat-button-toggle>
  }
</mat-button-toggle-group>

<hra-grid-container>
  @for (card of filteredCards(); track card) {
    <hra-content-button
      [link]="card.link"
      [external]="card.external"
      [imageSrc]="card.imageSrc"
      [date]="card.date"
      [tagline]="card.tagline"
      [tags]="card.tags"
    >
    </hra-content-button>
  }
</hra-grid-container>
