<img class="image" [attr.src]="imageSrc() | assetUrl" alt="" />
<div class="content">
  <div class="date">{{ date() }}</div>
  <a class="tagline-link" hraHyperlink [hraLink]="link()" [hraLinkExternal]="external()" [matTooltip]="tagline()">
    {{ tagline() }}
  </a>
  @if (tags().length > 0) {
    <mat-chip-set class="tags">
      @for (tag of tags(); track tag) {
        <mat-chip>{{ tag }}</mat-chip>
      }
    </mat-chip-set>
  }
</div>
