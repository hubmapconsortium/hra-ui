@if (external()) {
  <a mat-button target="_blank" rel="noopener noreferrer" class="content-button" [attr.href]="link()">
    <ng-container *ngTemplateOutlet="content" />
  </a>
} @else {
  <a mat-button class="content-button" [routerLink]="link()">
    <ng-container *ngTemplateOutlet="content" />
  </a>
}

<ng-template #content>
  <div class="header">
    <img class="image" alt="" [attr.src]="imageSrc() | assetUrl" />
  </div>

  <div class="content">
    <span class="date">{{ date() }}</span>
    <span class="tagline">{{ tagline() }}</span>
    <mat-chip-set class="tags">
      @for (tag of tags(); track tag) {
        <mat-chip class="tag">{{ tag }}</mat-chip>
      }
    </mat-chip-set>
  </div>
</ng-template>
