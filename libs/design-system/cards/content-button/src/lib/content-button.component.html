@if (external()) {
  <a mat-button [attr.href]="link()" target="_blank" rel="noopener noreferrer" class="content-button">
    <ng-container *ngTemplateOutlet="content" />
  </a>
} @else {
  <a mat-button [routerLink]="link()" class="content-button">
    <ng-container *ngTemplateOutlet="content" />
  </a>
}

<ng-template #content>
  <div class="header">
    @if (imageSrc(); as src) {
      <img class="image" [attr.src]="src | assetUrl" alt="" />
    }
  </div>

  <div class="content">
    <span class="date">{{ date() }}</span>
    <span class="tagline">{{ tagline() }}</span>
    <mat-chip-set class="tags">
      @for (tag of tags(); track tag) {
        <mat-chip class="tag">{{ tag }}</mat-chip>
      }
    </mat-chip-set>
  </div>
</ng-template>
