<a mat-button [hraLink]="link()" [hraLinkExternal]="external()" class="content-button">
  <div class="header">
    <img class="image" [attr.src]="imageSrc() | assetUrl" alt="" />
  </div>

  <div class="content">
    <span class="date">{{ date() }}</span>
    <span class="tagline">{{ tagline() }}</span>
    <mat-chip-set class="tags">
      @for (tag of tags(); track tag) {
        <mat-chip class="tag">{{ tag }}</mat-chip>
      }
    </mat-chip-set>
  </div>
</a>
