<a hraFeature="navigation-item" [hraClickEvent]="{ label: navigationItem().label }" mat-list-item [hraLink]="url()">
  <div class="nav-content">
    @if (navigationItem().icon; as icon) {
      <mat-icon matListItemIcon>{{ icon }}</mat-icon>
    }

    <span matListItemTitle>
      {{ navigationItem().label }}
    </span>
  </div>
</a>
