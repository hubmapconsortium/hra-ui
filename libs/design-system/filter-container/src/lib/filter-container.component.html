<div class="filter-container">
  <div class="top-row">
    @if (showTooltip()) {
      <hra-rich-tooltip-container #tooltipContent class="info-icon">
        <hra-rich-tooltip-tagline>
          {{ action() }}
        </hra-rich-tooltip-tagline>
        <hra-rich-tooltip-content>
          <ng-content select="[tooltipContent]" />
        </hra-rich-tooltip-content>
        <hra-rich-tooltip-actions>
          <ng-content select="[tooltipActions]" />
        </hra-rich-tooltip-actions>
      </hra-rich-tooltip-container>
      <button mat-icon-button [hraRichTooltip]="tooltipContent">
        <mat-icon>info</mat-icon>
      </button>
    }
    <button mat-button hraButtonVariant="secondary" class="category-button" color="primary">
      {{ action() }}
    </button>
  </div>

  @if (chips().length > 0) {
    <mat-chip-set class="chips-container">
      @for (chip of chips(); track chip.id) {
        <mat-chip (removed)="removeChip(chip)" disableRipple>
          {{ chip.id }}
          <button matChipRemove [attr.aria-label]="'Remove ' + chip.id">
            <mat-icon>close</mat-icon>
          </button>
        </mat-chip>
      }
    </mat-chip-set>
  }

  @if (enableDivider()) {
    <mat-divider />
  }
</div>
