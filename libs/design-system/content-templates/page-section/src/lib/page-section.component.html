<section [attr.id]="anchor() || null" #section>

    class="header"
    [tagline]="tagline()"
    [level]="level()"
    [icons]="icons()"
    [anchor]="anchor()"
    [breadcrumbs]="breadcrumbs()"

    [tags]="tags() || []"
  />

  <div class="content">
    <ng-content />
  </div>
</section>
