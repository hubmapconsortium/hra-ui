@if (hasCookiesEnabled()) {
  <youtube-player
    hraFeature="youtube-player"
    hraClickEvent
    [videoId]="videoId()"
    [playerVars]="{ rel: 0, showinfo: 0 }"
    [disableCookies]="true"
    #player
  />
} @else {
  <div class="youtube-thumbnail-container" hraFeature="youtube-thumbnail">
    <a target="_blank" rel="noopener noreferrer" hraFeature="watch-on-youtube" hraClickEvent [attr.href]="videoUrl()">
      <img class="thumbnail-image" [attr.src]="thumbnailUrl()" [attr.alt]="`YouTube video thumbnail for ${label()}`" />
    </a>
    <div class="enable-cookies-message">
      <button hraFeature="enable-cookies" hraClickEvent class="enable-cookies-button" (click)="onEnableCookiesClick()">
        Enable cookies
      </button>
      to watch videos
    </div>
  </div>
}
