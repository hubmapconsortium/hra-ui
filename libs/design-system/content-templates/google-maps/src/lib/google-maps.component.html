@if (isMarketingCookiesEnabled()) {
  <google-map [zoom]="zoom()" width="100%" height="100%" [center]="markerPosition()" mapId="DEMO_MAP_ID">
    <map-advanced-marker [position]="markerPosition()"></map-advanced-marker>
  </google-map>
} @else {
  <div class="btn-container">
    <a mat-fab extended href="https://maps.app.goo.gl/PqeHqwZbFdU7KBWp8" target="_blank">
      <mat-icon>open_in_new</mat-icon>
      Open Google Maps
    </a>
  </div>
  <div class="enable-cookies">
    <button mat-button class="link" (click)="enableCookies()" disableRipple>Enable cookies</button>
    to view Google Maps
  </div>
}
