@if (isMarketingCookiesEnabled()) {
  <iframe [src]="mapsUrl()" frameBorder="0" class="google-maps"></iframe>
} @else {
  <a hraFeature="maps-placeholder" hraClickEvent [href]="alternateUrl()" target="_blank">
    <img class="maps-placeholder" [src]="'assets/ui-images/maps-cookies-disabled.png' | assetUrl" alt="Google Maps" />
  </a>
  <div class="enable-cookies">
    <button hraFeature="enable-cookies" hraClickEvent mat-button class="link" (click)="enableCookies()" disableRipple>
      Enable cookies
    </button>
    to view Google Maps
  </div>
}
