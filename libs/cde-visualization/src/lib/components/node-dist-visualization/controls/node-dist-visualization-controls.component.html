<button
  mat-icon-button
  class="delete"
  aria-label="Delete selected nodes"
  hraIconButtonSize="large"
  hraPlainTooltip="Select at least one cell to delete it from this dataset"
  hraFeature="delete-selected-cells"
  hraClickEvent
  [disabled]="deleteDisabled()"
  (click)="deleteClick.emit()"
>
  <mat-icon>delete</mat-icon>
</button>

<mat-button-toggle-group
  aria-label="Visualization mode"
  hraButtonToggleSize="medium"
  hraFeature="toggle"
  [value]="viewMode()"
  (change)="viewMode.set($event.value)"
>
  <mat-button-toggle
    value="select"
    hraPlainTooltip="Select cells to delete from this dataset"
    hraFeature="select"
    hraClickEvent
  >
    Select
  </mat-button-toggle>
  <mat-button-toggle
    value="inspect"
    hraPlainTooltip="Get information about individual cell types"
    hraFeature="inspect"
    hraClickEvent
  >
    Inspect
  </mat-button-toggle>
  <mat-button-toggle
    value="explore"
    hraPlainTooltip="Zoom, pan, and rotate the view of this visualization"
    hraFeature="explore"
    hraClickEvent
  >
    Explore
  </mat-button-toggle>
</mat-button-toggle-group>
