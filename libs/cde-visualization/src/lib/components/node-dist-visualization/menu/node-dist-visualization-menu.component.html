<button
  mat-icon-button
  hraIconButtonSize="large"
  aria-label="Icon to open nested menu"
  hraPlainTooltip="More"
  hraFeature="menu"
  hraClickEvent
  [matMenuTriggerFor]="menu"
>
  <mat-icon>more_vert</mat-icon>
</button>

<mat-menu class="vis-overlay" hraFeature="menu" #menu="matMenu">
  <button
    mat-menu-item
    matRipple
    matRippleColor="#201E3D14"
    hraFeature="info"
    hraClickEvent
    hraHoverEvent
    hraHoverEventTriggerOn="mouseenter"
    [matMenuTriggerFor]="infoSubMenu"
  >
    <mat-icon>info</mat-icon>
    <span>Info</span>
    <mat-icon class="expand-arrow">arrow_right</mat-icon>
  </button>
  <button
    mat-menu-item
    matRipple
    matRippleColor="#201E3D14"
    hraFeature="download"
    hraClickEvent
    [matMenuTriggerFor]="downloadSubMenu"
  >
    <mat-icon>download</mat-icon>
    <span>Downloads</span>
    <mat-icon class="expand-arrow">arrow_right</mat-icon>
  </button>
  <button
    mat-menu-item
    matRipple
    matRippleColor="#201E3D14"
    hraFeature="reset"
    hraClickEvent
    [matMenuTriggerFor]="resetSubMenu"
  >
    <mat-icon>reset_wrench</mat-icon>
    <span>Reset</span>
    <mat-icon class="expand-arrow">arrow_right</mat-icon>
  </button>
  @if (!fullscreenMode()) {
    <button mat-menu-item hraFeature="fullscreen" hraClickEvent (click)="fullscreenClick.emit()">
      <mat-icon>fullscreen</mat-icon>
      Full Screen
    </button>
  }
  <button
    mat-menu-item
    hraClickEvent
    [hraFeature]="edgesDisabled() ? 'show-cell-links' : 'hide-cell-links'"
    (click)="this.edgesDisabled.set(!this.edgesDisabled())"
  >
    <mat-icon>{{ edgesDisabled() ? 'visibility' : 'visibility_off' }}</mat-icon>
    {{ edgesDisabled() ? 'Show' : 'Hide' }} Cell Links
  </button>
  <a
    mat-menu-item
    href="https://github.com/hubmapconsortium/hra-ui/blob/main/apps/cde-visualization-wc/EMBEDDING.md"
    target="_blank"
    rel="noopener noreferrer"
    hraFeature="embed-app"
    hraClickEvent
  >
    <mat-icon>code</mat-icon>
    Embed App
  </a>
</mat-menu>

<mat-menu class="info-sub-menu" #infoSubMenu="matMenu">
  <div>
    <ul>
      Zoom Options
      <li>Mouse pinwheel</li>
      <li>Trackpad Pinch</li>
    </ul>
    <ul>
      Pan Options
      <li>CTRL/CMD + mouse drag</li>
      <li>Right click + mouse drag</li>
      <li>Keyboard arrows</li>
    </ul>
    <ul>
      Rotation Options
      <li>CTRL/CMD + keyboard arrows</li>
      <li>Mouse Drag</li>
    </ul>
  </div>
</mat-menu>

<mat-menu class="download-sub-menu" #downloadSubMenu="matMenu">
  <button mat-menu-item hraFeature="download-png" hraClickEvent (click)="downloadClick.emit()">
    <mat-icon>download</mat-icon>
    <span>PNG</span>
  </button>
</mat-menu>

<mat-menu class="reset-sub-menu" #resetSubMenu="matMenu">
  <button mat-menu-item hraFeature="reset-visualization-view" hraClickEvent (click)="resetViewClick.emit()">
    <mat-icon>reset_wrench</mat-icon>
    <span>Reset Visualization View</span>
  </button>

  <button mat-menu-item hraFeature="reset-deleted-cells" hraClickEvent (click)="resetDeletedClick.emit()">
    <mat-icon>reset_wrench</mat-icon>
    <span>Reset Deleted Cells</span>
  </button>
</mat-menu>
