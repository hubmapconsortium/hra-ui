<button
  mat-icon-button
  hraIconButtonSize="large"
  aria-label="Icon to open nested menu"
  hraPlainTooltip="More"
  hraFeature="menu"
  hraClickEvent
  [matMenuTriggerFor]="menu"
>
  <mat-icon>more_vert</mat-icon>
</button>

<mat-menu class="histogram-overlay" #menu="matMenu">
  <button
    mat-menu-item
    matRipple
    matRippleColor="#201E3D14"
    hraFeature="info"
    hraClickEvent
    hraHoverEvent
    hraHoverEventTriggerOn="mouseenter"
    [matMenuTriggerFor]="infoSubMenu"
  >
    <mat-icon>info</mat-icon>
    <span>Info</span>
    <mat-icon class="expand-arrow">arrow_right</mat-icon>
  </button>
  <button
    mat-menu-item
    matRipple
    matRippleColor="#201E3D14"
    hraFeature="download"
    hraClickEvent
    [matMenuTriggerFor]="downloadSubMenu"
  >
    <mat-icon>download</mat-icon>
    <span>Downloads</span>
    <mat-icon class="expand-arrow">arrow_right</mat-icon>
  </button>
  @if (!dialogOpen()) {
    <button mat-menu-item hraFeature="fullscreen" hraClickEvent (click)="open.emit()">
      <mat-icon>fullscreen</mat-icon>
      Full Screen
    </button>
  }
  <a
    mat-menu-item
    href="https://github.com/hubmapconsortium/hra-ui/blob/main/apps/cde-visualization-wc/EMBEDDING.md"
    target="_blank"
    rel="noopener noreferrer"
    hraFeature="embed-app"
    hraClickEvent
  >
    <mat-icon>code</mat-icon>
    Embed App
  </a>
</mat-menu>

<mat-menu class="info-sub-menu" #infoSubMenu="matMenu">
  This histogram plot shows the cell-to-nearest-anchor cell distance distributions categorized by each cell type in the
  dataset.
</mat-menu>

<mat-menu class="download-sub-menu" #downloadSubMenu="matMenu">
  <button mat-menu-item hraFeature="download-png" hraClickEvent (click)="download.emit('png')">
    <mat-icon>download</mat-icon>
    PNG
  </button>
  <button mat-menu-item hraFeature="download-svg" hraClickEvent (click)="download.emit('svg')">
    <mat-icon>download</mat-icon>
    SVG
  </button>
</mat-menu>
