<ng-container hraFeature="source-data-list">
  <div class="source-list-header">
    @if (!hideTitle()) {
      <span class="source-list-title">Source data</span>
    }
    <div class="view-fullscreen" [class.hide-title]="hideTitle()">
      <hra-results-indicator description="Viewing" [value]="selectedCount()" [total]="sources().length" />
      @if (!hideTitle()) {
        <button
          mat-icon-button
          hraIconButtonSize="large"
          hraFeature="open-source-fullscreen"
          hraClickEvent
          (click)="openSourceListFullscreen()"
        >
          <mat-icon>fullscreen</mat-icon>
        </button>
      }
    </div>
  </div>

  <div class="table-content" [class.hidden]="!showTable()">
    @if (sources().length !== 0) {
      <hra-table
        variant="alternating"
        [rows]="sources()"
        [columns]="tableColumns"
        [enableRowSelection]="true"
        [enableSort]="true"
        [verticalDividers]="true"
        (selectionChange)="onSelectionChange()"
        #sourceTable
      />
    } @else {
      <!--
        TODO: Need to do in a way that FTU hides the source list completely from the grid,
        will handle in the future.
    -->
      <ftu-empty-biomarker emptyBehaviorText="We currently do not have data for this functional tissue unit." />
    }
  </div>

  <ng-template let-columnName #dataHover>
    <div class="biomarker-table-hover full-column-name" [class.empty]="columnName.toString() === ''">
      {{ columnName }}
    </div>
  </ng-template>
</ng-container>
