<!-- eslint-disable @angular-eslint/template/mouse-events-have-key-events -->
<cdk-virtual-scroll-viewport
  hraFeature="biomarker-table"
  [tvsItemSize]="rowHeight"
  [headerHeight]="headerHeight"
  [style.height.px]="viewportHeight"
>
  <table class="table" mat-table [dataSource]="dataSource" #table>
    <ng-container matColumnDef="type" sticky>
      <th *matHeaderCellDef mat-header-cell>Cell types</th>
      <td
        *matCellDef="let element"
        class="type"
        mat-cell
        [class.highlight]="isHighlighted(element)"
        [hraPlainTooltip]="element[0]"
      >
        {{ element[0] }}
      </td>
    </ng-container>

    <ng-container matColumnDef="count" sticky>
      <th *matHeaderCellDef class="count" mat-header-cell>#Cells</th>
      <td *matCellDef="let element" class="count" mat-cell [class.highlight]="isHighlighted(element)">
        {{ element[1] !== undefined ? (element[1] | number) : 'no data' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="preFiller">
      <th *matHeaderCellDef mat-header-cell></th>
      <td *matCellDef="let element" mat-cell style="max-width: unset">
        <div [style.width]="preFillerWidth"></div>
      </td>
    </ng-container>

    @for (column of columns; track column; let index = $index) {
      <ng-container [matColumnDef]="column">
        <th *matHeaderCellDef class="icon-header" mat-header-cell [hraPlainTooltip]="column">
          <div class="header-column-text">
            {{ column }}
          </div>
        </th>

        <td
          *matCellDef="let element"
          hraFeature="open-biomarker-bottom-sheet"
          hraClickEvent
          class="icon-cell"
          mat-cell
          style="cursor: pointer"
          [class.highlight]="isHighlighted(element)"
          (click)="openBottomSheet(element[index + 2])"
        >
          @if (element[index + 2] !== undefined) {
            <ftu-biomarker-table-data-icon
              class="icon"
              [color]="getColor(element[index + 2].color)"
              [size]="getSize(element[index + 2].size)"
            />
          } @else {
            <div class="empty"></div>
          }
        </td>
      </ng-container>
    }

    <ng-container matColumnDef="postFiller">
      <th *matHeaderCellDef mat-header-cell></th>
      <td *matCellDef="let element" mat-cell style="max-width: unset">
        <div [style.width]="postFillerWidth"></div>
      </td>
    </ng-container>

    <tr *matHeaderRowDef="(columns$ | async) ?? []; sticky: true" mat-header-row class="column-header-row"></tr>
    <tr
      *matRowDef="let row; columns: (columns$ | async) ?? []"
      mat-row
      (mouseover)="setHoverId(getHoverId(row))"
      (mouseout)="setHoverId(undefined)"
    ></tr>
  </table>
</cdk-virtual-scroll-viewport>
