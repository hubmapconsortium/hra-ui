<div class="icons">
  @if (opacity() > 0) {
    <button
      hraFeature="visibility-off"
      hraClickEvent
      mat-icon-button
      class="visibility icon visible"
      hraPlainTooltip="Hide"
      (click)="toggleVisibility()"
    >
      <mat-icon>visibility_off</mat-icon>
    </button>
  } @else {
    <button
      hraFeature="visibility-on"
      hraClickEvent
      mat-icon-button
      class="visibility icon invisible"
      hraPlainTooltip="Show"
      (click)="toggleVisibility()"
    >
      <mat-icon>visibility_on</mat-icon>
    </button>
  }
  <button
    hraFeature="reset"
    hraClickEvent
    mat-icon-button
    class="icon reset"
    hraPlainTooltip="Reset"
    (click)="resetOpacity()"
  >
    <mat-icon>reset_settings</mat-icon>
  </button>
</div>

<mat-slider
  hraFeature="slider"
  hraClickEvent
  class="slider"
  [class.disabled]="!visible()"
  [step]="1"
  [min]="0"
  [max]="100"
>
  <input
    matSliderThumb
    class="opacity-slider"
    [value]="opacity()"
    (input)="opacityChange.emit(+slider.value)"
    #slider
  />
</mat-slider>

<mat-form-field hraFeature="input" hraClickEvent subscriptSizing="dynamic">
  <mat-label>Opacity</mat-label>
  <input matInput type="number" [value]="opacity()" (input)="opacityChange.emit(+input.value || 0)" #input />
</mat-form-field>
