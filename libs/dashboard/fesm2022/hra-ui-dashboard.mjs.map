@for (item of spec().items; track item) {
  <hra-title-card class="card" data-testid="title-card" [spec]="item" [class.span-columns]="isWideCardAt($index)">
    <div class="items" data-testid="metrics-group">
      @for (metric of item.items; track metric) {
        <hra-metrics-item data-testid="metrics-item" [spec]="metric" />
      }
    </div>
  </hra-title-card>
}
